<head>
<link rel="stylesheet" href="../css/secretaria.css"></head>
<main>
    <section>
        <h1>Secretaria Virtual</h1>

        <fieldset>
            <legend>Formulário de Matrícula</legend>
            <form action="#" method="post" enctype="multipart/form-data">
                <p>
                    <label>Nome:</label>
                    <input type="text" name="nome_aluno" placeholder="Nome Completo" required>
                </p>
                <p>
                    <label>CPF:</label>
                    <input type="text" name="cpf" placeholder="000.000.000-00" maxlength="14" minlength="11" required>
                </p>
                <p>
                    <label>Endereço:</label>
                    <input type="text" name="endereco" placeholder="Rua, Número, Bairro">
                </p>
                <p>
                    <label>Cidade:</label>
                    <select name="cidade">
                        <option value="natal">Natal</option>
                        <option value="xiquexique">Xique-Xique</option>
                    </select>
                    <label>Estado:</label>
                    <select name="estado">
                        <option value="rn">RN</option>
                        <option value="ba">BA</option>
                    </select>
                </p>
                <p>
                    <label>Data de Nascimento:</label>
                    <input type="date" name="nascimento" required>
                </p>
                <p>
                    <label>Sexo:</label>
                    <input type="radio" name="sexo" value="M"> M 
                    <input type="radio" name="sexo" value="F"> F
                </p>
                <p>
                    <label>Documentação (PDF):</label>
                    <input type="file" name="doc" accept=".pdf,.jpg,.png">
                </p>
                <button type="submit">Enviar Matrícula</button>
                <button type="reset">Limpar</button>
            </form>
        </fieldset>

        <br>

        <fieldset>
            <legend>Fale Conosco</legend>
            <form action="#" method="post">
                <p>
                    <label>E-mail:</label>
                    <input type="email" name="email" placeholder="exemplo@email.com" required>
                </p>
                <p>
                    <label>Telefone:</label>
                    <input type="tel" name="tel" placeholder="(00) 00000-0000" maxlength="15" required>
                </p>
                <p>
                    <label>Assunto:</label>
                    <input type="text" name="assunto" placeholder="Ex: Dúvida sobre mensalidade">
                </p>
                <p>
                    <label>Mensagem:</label><br>
                    <textarea name="msg" rows="4" cols="50" placeholder="Escreva sua dúvida aqui..."></textarea>
                </p>
                <button type="submit">Enviar Mensagem</button>
                <button type="reset">Limpar</button>
            </form>
        </fieldset>
    </section>
</main>
