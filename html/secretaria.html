<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaria - Inova Tech</title>

    <link rel="stylesheet" href="../css/secretaria.css">
</head>

<body>

<!-- HEADER -->
    <header>
        <img src="../imgs/Inovalogo.png" alt="Logo Inova Tech">

        <h1>Inova Tech</h1>
        
        <nav>
            <ul>
                <li><a href="index.html" >Home</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="secretaria.html"class="active">Secretaria</a></li>
            </ul>
        </nav>
    </header>


<main>

    <h1>Secretaria Virtual</h1>

    <!-- MATRÍCULA -->
    <fieldset>
        <legend>Formulário de Matrícula</legend>

        <form>
            <label>Nome:</label>
            <input type="text" placeholder="Nome completo" required>

            <label>CPF:</label>
            <input type="text" placeholder="000.000.000-00" required>

            <label>Endereço:</label>
            <input type="text" placeholder="Rua, número, bairro">

            <label>Cidade:</label>
            <select>
                <option>Natal</option>
                <option>Xique-Xique</option>
            </select>

            <label>Estado:</label>
            <select>
                <option>RN</option>
                <option>BA</option>
            </select>

            <label>Data de Nascimento:</label>
            <input type="date" required>

            <label>Sexo:</label>
            <input type="radio" name="sexo"> Masculino
            <input type="radio" name="sexo"> Feminino

            <label>Documento:</label>
            <input type="file">

            <div class="btn-group">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </fieldset>

    <!-- CONTATO -->
    <fieldset>
        <legend>Fale Conosco</legend>

        <form>
            <label>Email:</label>
            <input type="email" placeholder="exemplo@email.com">

            <label>Telefone:</label>
            <input type="tel" placeholder="(00) 00000-0000">

            <label>Mensagem:</label>
            <textarea placeholder="Digite aqui..."></textarea>

            <div class="btn-group">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </fieldset>

    <!-- BOTÃO VOLTAR -->
    <a href="index.html" class="btn-voltar">← Voltar para Home</a>

</main>

<footer>
    <p>&copy; 2026 Inova Tech</p>
</footer>

</body>
</html>
